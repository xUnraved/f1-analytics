# OpenF1 REST-Client
quarkus.rest-client.openf1.url=https://api.openf1.org

# Schema automatisch anlegen/aktualisieren, Cache überlebt Neustarts
quarkus.hibernate-orm.schema-management.strategy=update

# CORS, damit das Frontend zugreifen darf
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:5174

# In-Memory H2 für lokale Entwicklung
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.http.port=8081
